<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phill's Wee Radio Streamer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem 0;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
            border: 1px solid #333;
            border-radius: 12px;
        }
        h1 { margin-top: 0; color: #fff; text-align: center; }
        button.station-button {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background-color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1rem;
            text-align: left;
        }
        button.station-button:hover { background-color: #444; }
        #resume-button {
            background-color: #34c759; /* Green */
        }
        #resume-button:hover {
            background-color: #2a9e48;
        }
        .station-icon { width: 2.5rem; height: 2.5rem; margin-right: 1rem; border-radius: 6px; object-fit: contain; }
        audio { width: 100%; margin-top: 1rem; }
        video#hls-player { width: 100%; margin-top: 1rem; display: none; }
        #status { margin-top: 1rem; color: #999; min-height: 1.5em; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Phill's Wee Radio Streamer</h1>

        <div id="station-list"></div>

        <audio id="audio-player" controls></audio>

        <div id="status">Select a station to play.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const WORKER_URL = 'https://tesla-radio-proxy.phill-5ff.workers.dev/';

        const audioPlayer = document.getElementById('audio-player');
        const stationListEl = document.getElementById('station-list');
        const statusEl = document.getElementById('status');
        let hlsInstance = null;

        const defaultStations = [
            // IMPORTANT: Clyde 1 is kept exactly as-is with its special token handling
            { name: "Clyde 1", url: "http://www.radiofeeds.net/playlists/bauer.pls?station=clyde1-aac", icon: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHe09jI2ikohDCgWJy-5BZBpdWcGfh_wdAxw&s"},
            { name: "Sky News Radio", url: "http://video.news.sky.com/snr/news/snrnews.mp3", icon: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzAwNDJFRCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkeT0iLjNlbSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjYwIiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0id2hpdGUiPlNLWTwvdGV4dD48L3N2Zz4="},
            { name: "GB News Radio", url: "https://listen-gbnews.sharp-stream.com/gbnews.mp3", icon: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI0ZGMDAwMCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkeT0iLjNlbSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjQ4IiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0id2hpdGUiPkdCPC90ZXh0Pjwvc3ZnPg=="},
            { name: "NPR News", url: "https://npr-ice.streamguys1.com/live.mp3", icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23228CCC'/%3E%3Ctext x='50%25' y='50%25' dy='.3em' text-anchor='middle' font-family='Arial, sans-serif' font-size='60' font-weight='bold' fill='white'%3ENPR%3C/text%3E%3C/svg%3E"}
        ];

        async function playStream(station) {
            statusEl.textContent = `Loading ${station.name}...`;
            audioPlayer.pause();

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            let finalStreamUrl = station.url;

            // Only use worker for .pls playlists (like Clyde 1)
            if (station.url.toLowerCase().startsWith('http:') && station.url.toLowerCase().includes('.pls')) {
                try {
                    const response = await fetch(`${WORKER_URL}?parse=${encodeURIComponent(station.url)}`);
                    const data = await response.json();
                    if (!response.ok || !data.freshStreamUrl) {
                        throw new Error(data.error || 'Worker returned an invalid response.');
                    }
                    finalStreamUrl = data.freshStreamUrl;
                } catch (error) {
                    statusEl.textContent = `Error: ${error.message}`;
                    return;
                }
            }

            statusEl.textContent = `Playing ${station.name}...`;
            audioPlayer.src = finalStreamUrl;
            audioPlayer.play();
            localStorage.setItem('lastPlayedStation', JSON.stringify(station));
        }

        function initializePlayer() {
            stationListEl.innerHTML = '';
            let lastPlayedStation = null;

            try {
                lastPlayedStation = JSON.parse(localStorage.getItem('lastPlayedStation'));
            } catch (e) {
                console.error("Could not parse lastPlayedStation from localStorage", e);
                localStorage.removeItem('lastPlayedStation');
            }

            if (lastPlayedStation && lastPlayedStation.name && lastPlayedStation.url) {
                const resumeButton = document.createElement('button');
                resumeButton.className = 'station-button';
                resumeButton.id = 'resume-button';

                const icon = document.createElement('img');
                icon.className = 'station-icon';
                if (lastPlayedStation.icon) { icon.src = lastPlayedStation.icon; }
                resumeButton.appendChild(icon);

                const name = document.createElement('span');
                name.textContent = `Resume: ${lastPlayedStation.name}`;
                resumeButton.appendChild(name);

                resumeButton.addEventListener('click', () => playStream(lastPlayedStation));
                stationListEl.appendChild(resumeButton);
            }

            defaultStations.forEach(station => {
                const button = document.createElement('button');
                button.className = 'station-button';

                const icon = document.createElement('img');
                icon.className = 'station-icon';
                icon.src = station.icon;
                button.appendChild(icon);

                const name = document.createElement('span');
                name.textContent = station.name;
                button.appendChild(name);

                button.addEventListener('click', () => playStream(station));
                stationListEl.appendChild(button);
            });
        }

        initializePlayer();
    </script>
</body>
</html>
